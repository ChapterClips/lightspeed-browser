<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'">
  <title>New Tab</title>
  <link rel="stylesheet" href="page.css">
</head>
<body data-page="newtab">
  <main class="page">
    <div class="logo-lockup">
      <img src="../assets/logo.svg" alt="">
      <div>
        <div class="eyebrow">Lightspeed Browser</div>
        <h1>Where to next?</h1>
        <p class="lead">Search the web or enter an address.</p>
      </div>
    </div>
    <form id="search-form" class="search">
      <input id="search-input" autofocus autocomplete="off" placeholder="Search or enter address">
      <button class="primary" type="submit">Go</button>
    </form>
    <section class="quick-links">
      <button class="quick-link" data-navigate="lightspeed://bookmarks">
        <strong>Bookmarks</strong><span>Your saved pages</span>
      </button>
      <button class="quick-link" data-navigate="lightspeed://history">
        <strong>History</strong><span>Recently visited</span>
      </button>
      <button class="quick-link" data-navigate="lightspeed://downloads">
        <strong>Downloads</strong><span>Files from the web</span>
      </button>
      <button class="quick-link" data-navigate="lightspeed://settings">
        <strong>Settings</strong><span>Make it yours</span>
      </button>
    </section>
    <section class="music card" aria-label="Music player">
      <div class="music-head">
        <div class="music-now">
          <div class="eyebrow">Music</div>
          <div id="music-title">Pick a track to play</div>
        </div>
        <div class="music-controls">
          <button id="music-prev" class="music-btn" title="Previous" aria-label="Previous"></button>
          <button id="music-play" class="music-btn play" title="Play" aria-label="Play"></button>
          <button id="music-next" class="music-btn" title="Next" aria-label="Next"></button>
          <input id="music-volume" class="music-volume" type="range" min="0" max="1" step="0.01" value="0.7" aria-label="Volume">
        </div>
      </div>
      <div id="music-list" class="music-list"></div>
      <audio id="music-audio"></audio>
    </section>

    <div class="toolbar"><h2>Recent</h2></div>
    <section id="recent-list" class="list"></section>
  </main>

  <button id="bg-button" class="bg-button" type="button" title="Change background">
    Change background
  </button>

  <div id="bg-picker" class="bg-picker" hidden>
    <div class="bg-panel">
      <div class="bg-panel-head">
        <h2>Choose a background</h2>
        <button id="bg-close" class="secondary" type="button">Close</button>
      </div>
      <div id="bg-grid" class="bg-grid"></div>
    </div>
  </div>

  <script src="page.js"></script>
</body>
</html>
